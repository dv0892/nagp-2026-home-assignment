apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-app-nagp2026-assignment-k8s
  namespace: nagp2026-assignment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-nagp2026-assignment-k8s
  # Since your app starts at 4, HPA will scale down to 2 under no load, up to 10 under peak load
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50